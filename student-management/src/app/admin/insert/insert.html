<h2>Insert Student</h2>

<div>
  <label>Reg No:</label>
  <input type="text" [(ngModel)]="student.regNo" placeholder="e.g. REG000" />
</div>

<div>
  <label>Roll No:</label>
  <input type="number" [(ngModel)]="student.rollNo" placeholder="Enter Roll No" />
</div>

<div>
  <label>Name:</label>
  <input type="text" [(ngModel)]="student.name" placeholder="Enter Name" />
</div>

<div>
  <label>Standard:</label>
  <input type="text" [(ngModel)]="student.standard" placeholder="e.g. 10th" />
</div>

<div>
  <label>School:</label>
  <input type="text" [(ngModel)]="student.school" placeholder="Enter School Name" />
</div>

<button (click)="onSubmit()">Save Student</button>
<button (click)="goBack()">Cancel</button>
